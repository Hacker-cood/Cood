<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Fixed Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #0b001a;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: #fff;
            overflow-x: hidden; position: relative;
            font-family: 'Tajawal', sans-serif;
        }

        /* --- 1. Fix Icon Visibility & Position --- */
        .bg-icon {
            position: absolute;
            z-index: 99; /* Higher than container */
            pointer-events: none;
            opacity: 1;
            width: 120px;
        }

        /* Move slightly towards center from edges */
        .bg-ae {
            top: 10px; right: 10px;
            border-radius: 18px;
            filter: drop-shadow(0 0 25px var(--neon-purple));
            animation: floatAE 6s ease-in-out infinite;
        }

        .bg-am {
            bottom: 10px; left: 10px;
            border-radius: 50%;
            filter: drop-shadow(0 0 25px var(--neon-green-dark));
            animation: floatAM 7s ease-in-out infinite;
        }

        @keyframes floatAE { 0%, 100% { transform: translate(0,0) rotate(15deg); } 50% { transform: translate(-10px, 10px) rotate(20deg); } }
        @keyframes floatAM { 0%, 100% { transform: translate(0,0) rotate(-10deg); } 50% { transform: translate(10px, -10px) rotate(-15deg); } }

        /* --- 2. Main Container --- */
        .container {
            background: rgba(20, 5, 35, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 30px;
            padding: 50px 30px;
            width: 100%; max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* particles inside only */
        #innerCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .logo-container {
            width: 150px; height: 150px; margin: 0 auto 20px;
            border-radius: 50%; padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b001a; }

        .title-img {
            width: 85%; max-width: 260px; margin: 0 auto 15px; display: block;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        /* --- 3. Modern Typography & Gradient Border --- */
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 16px;
            color: #fff;
            display: inline-block;
            margin-bottom: 35px;
            position: relative;
            padding-bottom: 10px;
        }

        .tagline::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
        }

        /* --- Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 18px; border-radius: 15px;
            font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            border-color: var(--neon-blue);
            box-shadow: 0 5px 15px rgba(157, 0, 255, 0.3);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        /* --- 4. Visitor Badge Fix --- */
        .visitor-badge {
            margin-top: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .visitor-badge span { color: var(--neon-blue); font-weight: bold; }

    </style>
</head>
<body>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div class="container">
        <canvas id="innerCanvas"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        
        <p class="tagline">Here is everything useful</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="#" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">💬 Telegram</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <div class="visitor-badge">👁 Visitors: <span id="vCount">1</span></div>
    </div>

    <script>
        // 1. Stable Visitor Counter Logic
        document.addEventListener("DOMContentLoaded", () => {
            let count = localStorage.getItem('vortx_stable_cnt');
            if (!count) {
                count = 1; // Start high
            } else {
                count = parseInt(count) + 1; // Only +1 per refresh
            }
            localStorage.setItem('vortx_stable_cnt', count);
            document.getElementById('vCount').innerText = count.toLocaleString();
        });

        // 2. Slow Inner Particles
        const canvas = document.getElementById('innerCanvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speed = Math.random() * 0.2 + 0.05; // Very slow
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(157, 0, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            dots = [];
            for(let i=0; i<40; i++) dots.push(new Dot());
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            dots.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
