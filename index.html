<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; color: #fff;
            overflow: hidden; position: relative;
            font-family: 'Tajawal', sans-serif;
        }

        /* --- المطر في الخلفية --- */
        #rainCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; 
            pointer-events: none;
        }

        /* --- الشعارات بالزوايا --- */
        .bg-icon {
            position: absolute;
            z-index: 150; 
            width: 120px;
            pointer-events: none;
        }

        .bg-ae {
            top: 20px; right: 20px;
            filter: drop-shadow(0 0 25px var(--neon-purple));
            animation: float 6s infinite;
        }

        .bg-am {
            bottom: 20px; left: 20px;
            border-radius: 50%;
            filter: drop-shadow(0 0 25px var(--neon-green-dark));
            animation: float 7s infinite reverse;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- المستطيل الزجاجي (تمت زيادة الشفافية) --- */
        .container {
            /* تقليل الألوان والضباب لرؤية الخلفية بوضوح */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, rgba(15, 5, 25, 0.2) 100%);
            backdrop-filter: blur(8px) saturate(120%);
            -webkit-backdrop-filter: blur(8px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            width: 100%; max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05);
            overflow: hidden; /* ضروري عشان الخطوط المتحركة ما تطلع برا الحواف الدائرية */
        }

        /* --- كود الخطوط المتصادمة داخل المستطيل --- */
        #innerBouncingCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* خلف المحتوى الداخلي لكن داخل المستطيل */
            pointer-events: none;
        }

        /* رفع المحتوى ليكون فوق الخطوط المتصادمة */
        .logo-container, .title-img, .tagline, .links-wrapper, .visitor-badge {
            position: relative;
            z-index: 10;
        }

        /* --- اللوجو وتأثير Glitch --- */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 15px;
            border-radius: 50%; padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        .title-img {
            width: 85%; max-width: 250px; margin: 15px auto 5px; display: block;
        }

        .glitch { animation: glitch 5s infinite; }
        @keyframes glitch {
            0%, 92%, 100% { filter: none; transform: translate(0); }
            94% { filter: brightness(1.8) hue-rotate(20deg); transform: translate(2px, -2px); }
            96% { filter: contrast(2); transform: translate(-2px, 2px); }
        }

        /* --- التاغ لاين (تم تغييره للبنفسجي الفاتح للقراءة) --- */
        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; 
            color: #d866ff; /* بنفسجي فاتح عشان يوضح مع الخلفية الشفافة */
            font-weight: 900; text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(157, 0, 255, 0.3);
            display: inline-block; padding-bottom: 5px;
            text-shadow: 0 0 10px rgba(157, 0, 255, 0.5);
        }

        /* --- الأزرار --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(0, 0, 0, 0.5); /* تغميق الأزرار شوي عشان تبرز فوق الخطوط */
            padding: 18px; border-radius: 15px;
            font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #b400ff, 0 0 30px #7a00ff;
            border-color: var(--neon-purple);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        .visitor-badge {
            margin-top: 30px; font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        .visitor-badge span { color: #d866ff; font-weight: bold; }

    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div class="container" id="mainContainer">
        
        <canvas id="innerBouncingCanvas"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img glitch">
        
        <p class="tagline">After Effects Templates & Motion Design Tools</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="#" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">💬 Telegram</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <div class="visitor-badge">👁 Visitors: <span id="vCount">0</span></div>
    </div>

    <script>
        // 1. حركة المطر البطيئة في الخلفية
        const rainCanvas = document.getElementById('rainCanvas');
        const ctxRain = rainCanvas.getContext('2d');
        rainCanvas.width = window.innerWidth;
        rainCanvas.height = window.innerHeight;

        const rainParticles = [];
        for (let i = 0; i < 60; i++) {
            rainParticles.push({
                x: Math.random() * rainCanvas.width,
                y: Math.random() * rainCanvas.height,
                size: Math.random() * 2,
                speedY: Math.random() * 0.4 + 0.1,
                opacity: Math.random() * 0.5 + 0.1
            });
        }

        function animateRain() {
            ctxRain.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
            rainParticles.forEach(p => {
                ctxRain.fillStyle = `rgba(157, 0, 255, ${p.opacity})`;
                ctxRain.beginPath();
                ctxRain.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctxRain.fill();
                p.y += p.speedY;
                if (p.y > rainCanvas.height) {
                    p.y = 0;
                    p.x = Math.random() * rainCanvas.width;
                }
            });
            requestAnimationFrame(animateRain);
        }
        animateRain();

        // 2. حركة الخطوط المتصادمة داخل المستطيل (Network Particles)
        const innerCanvas = document.getElementById('innerBouncingCanvas');
        const ctxInner = innerCanvas.getContext('2d');
        const container = document.getElementById('mainContainer');
        let innerW, innerH;

        function resizeInnerCanvas() {
            innerW = container.offsetWidth;
            innerH = container.offsetHeight;
            innerCanvas.width = innerW;
            innerCanvas.height = innerH;
        }

        const linesParticles = [];
        // تقليل العدد إلى 20 عشان ما يسبب إزعاج بصري كبير
        for(let i=0; i<20; i++) {
            linesParticles.push({
                x: Math.random() * 300,
                y: Math.random() * 300,
                vx: (Math.random() - 0.5) * 1.5, // سرعة الكرات
                vy: (Math.random() - 0.5) * 1.5
            });
        }

        function animateInnerLines() {
            ctxInner.clearRect(0, 0, innerW, innerH);

            for(let i=0; i<linesParticles.length; i++) {
                let p = linesParticles[i];
                p.x += p.vx;
                p.y += p.vy;

                // التصادم مع الجدران الداخلية للمستطيل
                if(p.x <= 0 || p.x >= innerW) p.vx *= -1;
                if(p.y <= 0 || p.y >= innerH) p.vy *= -1;
            }

            // رسم الخطوط بين الكرات القريبة من بعضها
            ctxInner.lineWidth = 1;
            for(let i=0; i<linesParticles.length; i++) {
                for(let j=i+1; j<linesParticles.length; j++) {
                    let dx = linesParticles[i].x - linesParticles[j].x;
                    let dy = linesParticles[i].y - linesParticles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if(dist < 80) { // مسافة الربط بين الكرات
                        ctxInner.beginPath();
                        ctxInner.strokeStyle = `rgba(157, 0, 255, ${1 - dist/80})`;
                        ctxInner.moveTo(linesParticles[i].x, linesParticles[i].y);
                        ctxInner.lineTo(linesParticles[j].x, linesParticles[j].y);
                        ctxInner.stroke();
                    }
                }
            }
            requestAnimationFrame(animateInnerLines);
        }

        // تشغيل وضبط مقاسات الكانفاس الداخلي
        window.addEventListener('resize', () => {
            rainCanvas.width = window.innerWidth;
            rainCanvas.height = window.innerHeight;
            resizeInnerCanvas();
        });
        
        // نحتاج وقت بسيط جداً عشان المستطيل ياخذ مقاسه الطبيعي بعد التحميل
        setTimeout(() => {
            resizeInnerCanvas();
            animateInnerLines();
        }, 100);

        // 3. عداد الزوار يبدأ من 1 بشكل حقيقي
        let count = localStorage.getItem('vortx_real_count') || 0;
        count = parseInt(count) + 1;
        localStorage.setItem('vortx_real_count', count);
        document.getElementById('vCount').innerText = count.toLocaleString();

        // 4. Parallax Background Movement
        document.addEventListener("mousemove", e => {
            const x = (window.innerWidth / 2 - e.clientX) / 60;
            const y = (window.innerHeight / 2 - e.clientY) / 60;
            document.body.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
