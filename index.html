<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | My Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #006400; 
            --bg-dark: #0b001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Entrance Animations --- */
        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes btnFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 0 40px rgba(157, 0, 255, 0.2); }
            50% { box-shadow: 0 0 60px rgba(157, 0, 255, 0.4); }
            100% { box-shadow: 0 0 40px rgba(157, 0, 255, 0.2); }
        }

        /* --- Floating Icons (Back to the corners) --- */
        .bg-icon {
            position: absolute;
            z-index: -2; /* Behind the glass */
            width: 135px;
            opacity: 0.9;
            pointer-events: none;
        }

        .bg-ae {
            top: -45px;
            right: -45px;
            border-radius: 18px;
            filter: drop-shadow(0 0 25px var(--neon-purple)) drop-shadow(0 0 50px var(--neon-purple));
            animation: floatAE 6s ease-in-out infinite;
        }

        .bg-am {
            top: -45px;
            left: -45px;
            border-radius: 50%;
            filter: drop-shadow(0 0 25px var(--neon-green-dark)) drop-shadow(0 0 50px var(--neon-green-dark));
            animation: floatAM 7s ease-in-out infinite reverse;
        }

        @keyframes floatAE { 0%, 100% { transform: translateY(0) rotate(10deg); } 50% { transform: translateY(-15px) rotate(20deg); } }
        @keyframes floatAM { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-15px) rotate(-20deg); } }

        /* --- Main Card --- */
        .container {
            background: rgba(20, 5, 35, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 25px;
            padding: 45px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.2);
            opacity: 0;
            animation: cardEntrance 0.8s ease-out forwards, cardPulse 4s infinite ease-in-out;
        }

        #cardCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            border-radius: 25px;
        }

        /* --- Profile & Content --- */
        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 25px var(--neon-purple);
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 0.3s;
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b001a; }

        .title-img {
            width: 85%;
            max-width: 260px;
            margin: 5px auto 10px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(157, 0, 255, 0.6));
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        .bio { font-size: 15px; color: #b3b3b3; margin-bottom: 25px; opacity: 0; animation: btnFadeIn 0.5s ease-out forwards; animation-delay: 0.6s; }

        /* --- Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 16px 20px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            animation: btnFadeIn 0.5s ease-out forwards;
        }

        .link-btn:nth-child(1) { animation-delay: 0.7s; }
        .link-btn:nth-child(2) { animation-delay: 0.8s; }
        .link-btn:nth-child(3) { animation-delay: 0.9s; }
        .link-btn:nth-child(4) { animation-delay: 1.0s; }

        .link-btn:hover {
            transform: scale(1.05);
            background: rgba(157, 0, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: 1px solid var(--neon-blue); }

        .copy-btn {
            background: transparent;
            border: 1px dashed var(--neon-blue);
            font-size: 13px;
            padding: 8px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 8px;
            color: var(--neon-blue);
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 1.1s;
        }

        .visitor-counter { margin-top: 25px; font-size: 14px; color: rgba(255, 255, 255, 0.5); opacity: 0; animation: btnFadeIn 0.5s ease-out forwards; animation-delay: 1.2s; }
        .visitor-counter span { color: var(--neon-blue); font-weight: bold; }

    </style>
</head>
<body>

    <div class="container">
        <img src="am.png" alt="Alight Motion" class="bg-icon bg-am">
        <img src="ae.png" alt="After Effects" class="bg-icon bg-ae">
        
        <canvas id="cardCanvas"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="VORTX Logo" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        <p class="bio">Content Creator | Edit & Motion Graphics</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="https://tiktok.com/@vortx" id="tk-link" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">▶️ YouTube</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <button class="copy-btn" onclick="copyLink()">📋 Copy TikTok Link</button>

        <div class="visitor-counter">
            👁 Visitors: <span id="visitCount">0</span>
        </div>
    </div>

    <script>
        // Visitor Counter
        document.addEventListener("DOMContentLoaded", () => {
            let visits = localStorage.getItem('vortx_v_count') || 0;
            visits++;
            localStorage.setItem('vortx_v_count', visits);
            document.getElementById('visitCount').innerText = visits;
        });

        // Copy Link
        function copyLink() {
            const link = document.getElementById('tk-link').href;
            navigator.clipboard.writeText(link).then(() => {
                alert("TikTok link copied!");
            });
        }

        // Particle Canvas
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.vy = Math.random()*0.5+0.2; this.o = Math.random()*0.5; }
            u() { this.y -= this.vy; if (this.y < 0) this.y = canvas.height; }
            d() { ctx.fillStyle = `rgba(157,0,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
        }
        function setup() { for(let i=0; i<30; i++) particles.push(new P()); }
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(anim); }
        init(); setup(); anim();
        window.onresize = init;
    </script>
</body>
</html>
