<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | My Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --bg-dark: #0b001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 1. Animated Particles Inside Card (Canvas) --- */
        #cardCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            border-radius: 25px;
        }

        /* --- 3. Entrance Animation --- */
        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes btnFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 8. Optional Pulse Effect --- */
        @keyframes cardPulse {
            0% { box-shadow: 0 0 40px rgba(157, 0, 255, 0.15); }
            50% { box-shadow: 0 0 60px rgba(157, 0, 255, 0.3); }
            100% { box-shadow: 0 0 40px rgba(157, 0, 255, 0.15); }
        }

        /* --- 2. Main Card Container (Glow & Shadows) --- */
        .container {
            background: rgba(20, 5, 35, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 25px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            z-index: 1;
            /* 2. Glow & Shadows */
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.05);
            /* 3. Entrance */
            opacity: 0;
            animation: cardEntrance 0.8s ease-out forwards, cardPulse 4s infinite ease-in-out;
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 25px var(--neon-purple);
            position: relative;
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 0.3s;
        }

        .logo {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid #0b001a;
        }

        /* --- 5. Convert Text to English --- */
        .title-img {
            width: 85%;
            max-width: 260px;
            margin: 5px auto 10px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(157, 0, 255, 0.6));
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        p.bio {
            font-size: 15px;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.6;
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 0.6s;
        }

        /* --- 4. Button Hover Effects --- */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 16px 20px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            animation: btnFadeIn 0.5s ease-out forwards;
        }

        /* Staggered entrance */
        .link-btn:nth-child(1) { animation-delay: 0.7s; }
        .link-btn:nth-child(2) { animation-delay: 0.8s; }
        .link-btn:nth-child(3) { animation-delay: 0.9s; }
        .link-btn:nth-child(4) { animation-delay: 1.0s; }

        .link-btn:hover {
            transform: scale(1.05); /* 4. Scale up */
            background: rgba(157, 0, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-purple); /* 4. Increase glow */
        }

        .store-btn {
            background: linear-gradient(90deg, #4a00e0, #8e2de2);
            border: 1px solid var(--neon-blue);
        }

        /* --- 7. Copy Link Button --- */
        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--neon-blue);
            font-size: 13px;
            padding: 8px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
            color: var(--neon-blue);
            transition: 0.3s;
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 1.1s;
        }
        .copy-btn:hover { background: rgba(0, 243, 255, 0.1); }

        /* --- 6. Visitor Counter --- */
        .visitor-counter {
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: btnFadeIn 0.5s ease-out forwards;
            animation-delay: 1.2s;
        }
        .visitor-counter span { color: var(--neon-blue); font-weight: bold; }

    </style>
</head>
<body>

    <div class="container">
        <canvas id="cardCanvas"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="VORTX Logo" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        <p class="bio">Content Creator | Edit & Motion Graphics</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn" title="Visit our official online store">🛒 Online Store</a>
            <a href="https://tiktok.com/@your_user" class="link-btn" title="Follow me on TikTok">📱 TikTok</a>
            <a href="#" class="link-btn" title="Subscribe to my YouTube channel">▶️ YouTube</a>
            <a href="#" class="link-btn" title="Follow me on Instagram">📸 Instagram</a>
        </div>

        <button class="copy-btn" onclick="copyLink()">📋 Copy TikTok Link</button>

        <div class="visitor-counter">
            👁 Visitors: <span id="visitCount">0</span>
        </div>
    </div>

    <script>
        // --- 6. Visitor Counter Logic ---
        document.addEventListener("DOMContentLoaded", () => {
            let visits = localStorage.getItem('vortx_visits') || 0;
            visits++;
            localStorage.setItem('vortx_visits', visits);
            document.getElementById('visitCount').innerText = visits;
        });

        // --- 7. Copy Link Function ---
        function copyLink() {
            const tiktokLink = "https://tiktok.com/@your_user";
            navigator.clipboard.writeText(tiktokLink).then(() => {
                alert("TikTok link copied to clipboard!");
            });
        }

        // --- 1. Lightweight Particles Background ---
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(157, 0, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initCanvas();
        createParticles();
        animate();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
