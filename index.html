<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Enhanced Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --bg-dark: #0b001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 2. Electric Sparks VFX (Background Particles) --- */
        #sparkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* --- 1. Maintain Existing Layout (Diagonal Icons) --- */
        .bg-icon {
            position: absolute;
            z-index: -1; 
            pointer-events: none;
            opacity: 0.95;
        }

        /* Top-Right After Effects */
        .bg-ae {
            top: -45px; 
            right: -45px;
            width: 130px;
            border-radius: 18px;
            filter: drop-shadow(0 0 35px var(--neon-purple)) brightness(1.2);
            animation: floatAE 6s ease-in-out infinite;
        }

        /* Bottom-Left Alight Motion */
        .bg-am {
            bottom: -45px; 
            left: -45px;
            width: 115px;
            border-radius: 50%;
            filter: saturate(0.8) drop-shadow(0 0 25px var(--neon-purple));
            animation: floatAM 7s ease-in-out infinite;
        }

        @keyframes floatAE { 0%, 100% { transform: translateY(0) rotate(15deg); } 50% { transform: translateY(-15px) rotate(20deg); } }
        @keyframes floatAM { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(15px) rotate(-15deg); } }

        /* --- 2. Advanced Glassmorphism Container --- */
        .container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(20, 5, 35, 0.75) 100%);
            backdrop-filter: blur(25px) saturate(160%); /* Increased Blur */
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            
            /* Sharp Reflection Border */
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 25px;
            
            padding: 45px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.05);
            animation: cardEntrance 0.8s ease-out forwards;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Central Gojo Avatar --- */
        .logo-container {
            width: 145px;
            height: 145px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 30px var(--neon-purple);
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b001a; }

        /* --- VORTX Logo --- */
        .title-img {
            width: 85%;
            max-width: 250px;
            margin: 5px auto 10px;
            display: block;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        /* --- 2. Sub-headline Update --- */
        .bio { 
            font-size: 15px; 
            color: #d1d1d1; 
            margin-bottom: 30px; 
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* --- Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 14px; }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-btn:hover {
            transform: scale(1.04);
            background: rgba(157, 0, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        /* --- 2. Glassmorphic Visitor Badge --- */
        .visitor-badge {
            display: inline-block;
            margin-top: 30px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.05);
        }
        .visitor-badge span { color: var(--neon-blue); font-weight: bold; margin-left: 4px; }

    </style>
</head>
<body>

    <canvas id="sparkCanvas"></canvas>

    <div class="container">
        <img src="ae.png" alt="AE" class="bg-icon bg-ae">
        <img src="am.png" alt="AM" class="bg-icon bg-am">

        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        
        <p class="bio">Here is everything useful</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="#" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">💬 Telegram</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <div class="visitor-badge">
            👁 Visitors: <span id="visitCount">0</span>
        </div>
    </div>

    <script>
        // Visitor Counter Logic
        document.addEventListener("DOMContentLoaded", () => {
            let visits = localStorage.getItem('vortx_pro_count') || 1024;
            visits = parseInt(visits) + 1;
            localStorage.setItem('vortx_pro_count', visits);
            document.getElementById('visitCount').innerText = visits;
        });

        // --- 2. Optimized Electric Sparks VFX ---
        const canvas = document.getElementById('sparkCanvas');
        const ctx = canvas.getContext('2d');
        let sparks = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Spark {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.opacity = Math.random() * 0.8;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.init();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(157, 0, 255, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#9d00ff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setup() {
            sparks = [];
            const count = window.innerWidth < 768 ? 40 : 80; // Mobile Optimization
            for (let i = 0; i < count; i++) sparks.push(new Spark());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparks.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); setup(); });
        resize();
        setup();
        animate();
    </script>
</body>
</html>
