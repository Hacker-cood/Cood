<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.1), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.08), transparent 40%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; color: #fff;
            overflow-x: hidden; position: relative;
            font-family: 'Tajawal', sans-serif;
        }

        /* --- 1. Fix Icons (Diagonal Balance & Visibility) --- */
        .bg-icon {
            position: absolute;
            z-index: 99; /* Higher than glass container to prevent hiding */
            width: 120px;
            pointer-events: none;
            opacity: 1;
        }

        /* Top-Right After Effects */
        .bg-ae {
            top: 20px; right: 20px;
            border-radius: 18px;
            filter: drop-shadow(0 0 30px var(--neon-purple));
            animation: floatAE 6s ease-in-out infinite;
        }

        /* Bottom-Left Alight Motion */
        .bg-am {
            bottom: 20px; left: 20px;
            border-radius: 50%;
            filter: drop-shadow(0 0 30px var(--neon-green-dark));
            animation: floatAM 7s ease-in-out infinite;
        }

        @keyframes floatAE { 0%, 100% { transform: translateY(0) rotate(15deg); } 50% { transform: translateY(-15px) rotate(20deg); } }
        @keyframes floatAM { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(15px) rotate(-15deg); } }

        /* --- 2. Main Glass Card --- */
        .container {
            background: rgba(15, 5, 25, 0.85);
            backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            width: 100%; max-width: 450px;
            text-align: center; position: relative;
            z-index: 10;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.2);
            /* Entrance Animation */
            opacity: 0; transform: translateY(30px);
            animation: reveal 0.8s ease-out forwards;
        }

        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

        /* Particles Inside Card */
        #innerParticles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- 3. Profile & Logo --- */
        .logo-container {
            width: 145px; height: 145px; margin: 0 auto 15px;
            border-radius: 50%; padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 35px var(--neon-purple);
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        .title-img {
            width: 85%; max-width: 250px; margin: 15px auto 5px; display: block;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; color: var(--neon-blue); letter-spacing: 1px;
            text-transform: uppercase; font-weight: 900;
            margin-bottom: 30px; opacity: 0.9;
            display: inline-block; padding-bottom: 8px;
            border-bottom: 2px solid rgba(157, 0, 255, 0.3);
        }

        /* --- 4. Interactive Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(255, 255, 255, 0.05);
            padding: 18px; border-radius: 15px;
            font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-btn:hover {
            transform: scale(1.04);
            background: rgba(157, 0, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        /* --- 5. Visitor Badge --- */
        .visitor-badge {
            margin-top: 30px; padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; display: inline-block;
            font-size: 14px; color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .visitor-badge span { color: var(--neon-blue); font-weight: bold; }

    </style>
</head>
<body>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div class="container">
        <canvas id="innerParticles"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        <p class="tagline">After Effects Templates & Motion Design Tools</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="#" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">💬 Telegram</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <div class="visitor-badge">
            👁 Visitors: <span id="vCount">1,500</span>
        </div>
    </div>

    <script>
        // Visitor Counter Logic (1.5k Stable Start)
        document.addEventListener("DOMContentLoaded", () => {
            let count = localStorage.getItem('v_stable_final');
            if (!count) {
                count = 1500; 
            } else {
                count = parseInt(count) + 1; 
            }
            localStorage.setItem('v_stable_final', count);
            document.getElementById('vCount').innerText = count.toLocaleString();
        });

        // Inner Particles Logic
        const canvas = document.getElementById('innerParticles');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        class Dot {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*1.5; this.v = Math.random()*0.2 + 0.1; }
            u() { this.y -= this.v; if(this.y < 0) this.y = canvas.height; }
            d() { ctx.fillStyle = 'rgba(157, 0, 255, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
        }
        function init() { resize(); dots = []; for(let i=0; i<35; i++) dots.push(new Dot()); }
        function anim() { ctx.clearRect(0,0,canvas.width, canvas.height); dots.forEach(d => { d.u(); d.d(); }); requestAnimationFrame(anim); }
        window.onresize = init; init(); anim();
    </script>
</body>
</html>
