<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | روابطي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #006400; 
            --bg-dark: #0b001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
        }

        /* --- الحاوية الرئيسية --- */
        .container {
            background: rgba(20, 5, 35, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 25px;
            padding: 30px 20px; 
            width: 100%;
            max-width: 420px; 
            text-align: center;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.15);
            position: relative; /* 🔴 مهم عشان نقدر نثبت الشعارات بناءً على زوايا هذا المستطيل */
            z-index: 1; 
            margin-top: 50px; 
            margin-bottom: 20px; 
        }

        /* --- تنسيق الشعارات العائمة (الآن صارت مربوطة بالمستطيل) --- */
        /* شعار أفتر إفكتس (زاوية المستطيل اليمين من فوق) */
        .bg-icon-right {
            position: absolute;
            top: -45px; /* نرفعه فوق حافة المستطيل */
            right: -45px; /* نطلعه يمين حافة المستطيل */
            width: 130px; 
            z-index: -1; /* 🔴 هذا الأمر يخليه يرجع ورا خلفية المستطيل */
            border-radius: 18px; 
            border: none;
            filter: drop-shadow(0 0 25px var(--neon-purple)) drop-shadow(0 0 50px var(--neon-purple));
            animation: floatRightTop 6s ease-in-out infinite;
        }

        /* شعار لايت موشن (زاوية المستطيل اليسار من فوق) */
        .bg-icon-left {
            position: absolute;
            top: -45px; /* نرفعه فوق حافة المستطيل */
            left: -45px; /* نطلعه يسار حافة المستطيل */
            width: 130px; 
            z-index: -1; /* 🔴 هذا الأمر يخليه يرجع ورا خلفية المستطيل */
            border-radius: 50%; 
            border: none;
            filter: drop-shadow(0 0 25px var(--neon-green-dark)) drop-shadow(0 0 50px var(--neon-green-dark));
            animation: floatLeftTop 7s ease-in-out infinite reverse; 
        }

        /* حركات الطفو */
        @keyframes floatRightTop {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }

        @keyframes floatLeftTop {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-10px) rotate(-15deg); }
        }

        /* --- اللوقو الشخصي --- */
        .logo-container {
            width: 140px; 
            height: 140px;
            margin: 0 auto 12px;
            border-radius: 50%;
            padding: 4px;
            background: var(--neon-purple); 
            box-shadow: 0 0 25px var(--neon-purple), 0 0 50px var(--neon-purple); 
            position: relative;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; 
            border: 3px solid #0b001a; 
            background-color: #0b001a;
        }

        /* --- صورة الاسم VORTX (vr.png) --- */
        .title-img {
            width: 80%; 
            max-width: 240px; 
            margin: 5px auto 8px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(157, 0, 255, 0.6)); 
        }

        p.bio {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* --- الأزرار --- */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid rgba(157, 0, 255, 0.3);
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .link-btn:hover {
            background: rgba(157, 0, 255, 0.25);
            border-color: var(--neon-blue);
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        /* --- زر المتجر --- */
        .store-btn {
            background: linear-gradient(90deg, #4a00e0, #8e2de2);
            border: 1px solid var(--neon-blue);
            animation: pulseStore 2s infinite;
        }

        .store-btn:hover {
            background: linear-gradient(90deg, #8e2de2, #4a00e0);
        }

        @keyframes pulseStore {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="am.png" alt="Alight Motion" class="bg-icon-left">
        <img src="ae.png" alt="After Effects" class="bg-icon-right">

        <div class="logo-container">
            <img src="lg.png" alt="VORTX Logo" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        
        <p class="bio">صانع محتوى | Edit & Motion Graphics</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 المتجر الإلكتروني</a>
            <a href="#" class="link-btn">📱 تيك توك</a>
            <a href="#" class="link-btn">▶️ يوتيوب</a>
            <a href="#" class="link-btn">📸 إنستقرام</a>
        </div>
    </div>

</body>
</html>
